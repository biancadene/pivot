<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pivot — What should I do right now?</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <div class="logo-mark">P</div>
        <div>
          <h1>Pivot</h1>
          <p id="context">Your moment is ready</p>
        </div>
      </div>
    </header>

    <!-- MOOD -->
    <div class="mood">
      <button onclick="setMood('Relax')">Relax</button>
      <button onclick="setMood('Explore')">Explore</button>
      <button onclick="setMood('Eat')">Eat</button>
    </div>

    <!-- HERO -->
    <div id="hero"></div>

    <!-- SECTION TITLE -->
    <div class="section-title">Other options nearby</div>

    <!-- SECONDARY -->
    <div id="secondary"></div>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button class="close" onclick="closeModal()">✕</button>
        <div id="modalBody"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
