<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pivot — What should I do right now?</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="app">

    <!-- LOADING -->
    <div id="loading" class="loading">
      <div class="loader-text">Pivot is reading your moment…</div>
      <div class="loader-sub" id="loaderSub">Finding your location</div>
    </div>

    <!-- MAIN -->
    <div id="main" class="hidden">

      <header class="header">
        <h1>Pivot</h1>
        <p>What feels right right now</p>
      </header>

      <div id="context" class="context"></div>

      <div class="mood">
        <button onclick="setMood('Relax')">Relax</button>
        <button onclick="setMood('Explore')">Explore</button>
        <button onclick="setMood('Eat')">Eat</button>
      </div>

      <div id="results" class="results"></div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
